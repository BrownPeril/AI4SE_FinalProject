<p class="subtitle">选择一个最符合你期望的视觉调性</p>

<div class="cards">

      <div style="font-size: 48px;">🧋</div>

      <div style="color: #795548; font-size: 13px; margin-top: 4px;">米白/焦糖/深棕主色调</div>
    </div>
    <div class="card-body">
      <h3>A. 温暖奶茶风</h3>
      <p>奶茶色系暖色调，圆润卡片，柔软阴影。像捧着一杯奶茶一样温馨治愈。</p>

  </div>

  <div class="card" data-choice="clean" onclick="toggleSelect(this)">

      <div style="font-size: 48px;">📊</div>
      <div style="color: #1B5E20; font-size: 20px; font-weight: bold; margin-top: 8px;">清新健康风</div>
      <div style="color: #2E7D32; font-size: 13px; margin-top: 4px;">薄荷绿/白色/淡蓝</div>
    </div>
    <div class="card-body">
      <h3>B. 清新健康风</h3>
      <p>绿色+白色主调，简洁线条，突出健康管理和数据可视化。清新专业感。</p>
    </div>
  </div>

  <div class="card" data-choice="modern" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #263238 0%, #37474F 50%, #546E7A 100%); padding: 24px; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px;">
      <div style="font-size: 48px;">✨</div>
      <div style="color: #E0E0E0; font-size: 20px; font-weight: bold; margin-top: 8px;">现代极简风</div>

    <div class="card-body">
      <h3>C. 现代极简风</h3>
      <p>深色背景+亮色点缀，卡片式布局，图表优先。像一款高端健康追踪 App。</p>
